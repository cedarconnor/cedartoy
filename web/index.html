<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CedarToy - Shader Renderer</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <!-- CodeMirror for shader editing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>🌲 CedarToy</h1>
            <nav>
                <a href="https://github.com/yourusername/cedartoy" target="_blank">GitHub</a>
                <a href="/docs/USER_GUIDE.md" target="_blank">Docs</a>
            </nav>
        </header>

        <stage-rail></stage-rail>

        <main class="app-main">
            <aside class="shader-browser-panel">
                <shader-browser></shader-browser>
            </aside>

            <section class="config-editor-panel">
                <div id="stage-panels">
                    <div data-stage="project"><project-panel></project-panel></div>
                    <div data-stage="shader" hidden><config-editor></config-editor></div>
                    <div data-stage="output" hidden><output-panel></output-panel></div>
                    <div data-stage="render" hidden>
                        <div style="padding: 16px; color: #aaa;">
                            Use the Render panel at the bottom of the page to start your render.
                        </div>
                    </div>
                </div>
            </section>

            <section class="preview-panel-wrapper">
                <preview-panel></preview-panel>
                <audio-viz></audio-viz>
            </section>
        </main>

        <footer class="render-panel-wrapper">
            <render-panel></render-panel>
        </footer>
    </div>

    <!-- Hidden components -->
    <directory-browser></directory-browser>
    <shader-editor></shader-editor>

    <!-- CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>

    <!-- App Scripts -->
    <script type="module" src="/js/app.js?v=3"></script>
</body>
</html>
